<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Prize Wheel</title>
<style>
body {
  background: #0d0d0d;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  text-align: center;
}
.box { max-width: 400px; }
h1 { margin-bottom: 16px; }
button {
  padding: 14px 32px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #ff3b30;
  color: #fff;
  margin-top: 20px;
}
p { color: #aaa; margin-top: 12px; }
a { color: #5AC8FA; }
</style>
</head>
<body>
<div class="box">
  <h1>🔄 Reset Prize Wheel</h1>
  <button onclick="resetWheel()">RESET ALL PRIZES</button>
  <p id="msg"></p>
  <p><a href="/">← Back to wheel</a></p>
</div>
<script>
function resetWheel() {
  localStorage.removeItem("prizewheelQuantities");
  document.getElementById("msg").innerText = "✅ Prizes reset! Quantities restored.";
}
</script>
</body>
</html>
